[theme]
# ── Base ───────────────────────────────────────────────────────────────────────
base                           = "dark"
 
# ── Backgrounds ───────────────────────────────────────────────────────────────
# True charcoal — not green-tinted, gives premium fintech feel
backgroundColor                = "#0e0e12"
# Slightly elevated surface — visible card separation
secondaryBackgroundColor       = "#16161e"
 
# ── Primary accent ────────────────────────────────────────────────────────────
# Electric emerald — vivid, sharp, unmistakably sustainability
primaryColor                   = "#00e676"
 
# ── Text ──────────────────────────────────────────────────────────────────────
# Near-white with very slight warm tint — premium, not harsh
textColor                      = "#f0f0f4"
# Muted blue-white for links — clean, modern
linkColor                      = "#82b4ff"
 
# ── Borders & widgets ─────────────────────────────────────────────────────────
# Subtle violet-grey border — adds depth without being green-heavy
borderColor                    = "#2a2a3a"
showWidgetBorder               = true
showSidebarBorder              = true
 
# ── Corners — sharp-ish, professional fintech look ────────────────────────────
baseRadius                     = "0.4rem"
buttonRadius                   = "0.4rem"
 
# ── Fonts ─────────────────────────────────────────────────────────────────────
# Body: DM Sans — modern, crisp, used by fintech startups
font                           = "'DM Sans':https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap"
# Headings: Space Grotesk — geometric, techy, striking
headingFont                    = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
# Code/numbers: IBM Plex Mono — financial data standard
codeFont                       = "'IBM Plex Mono':https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
 
headingFontWeight              = 700
baseFontSize                   = "14px"
 
# ── Colour palette ────────────────────────────────────────────────────────────
# Sharp, high-contrast palette — each colour pops against the dark bg
greenColor                     = "#00e676"
blueColor                      = "#448aff"
orangeColor                    = "#ff9100"
redColor                       = "#ff5252"
yellowColor                    = "#ffd740"
violetColor                    = "#e040fb"
 
# ── Charts ────────────────────────────────────────────────────────────────────
chartCategoricalColors         = ["#00e676", "#448aff", "#ff9100", "#ffd740", "#e040fb", "#00b0ff"]
 
# ── Dataframe ─────────────────────────────────────────────────────────────────
dataframeBorderColor           = "#2a2a3a"
dataframeHeaderBackgroundColor = "#1e1e2a"
 
# ── Sidebar override ──────────────────────────────────────────────────────────
[theme.sidebar]
# Slightly different charcoal so sidebar is visually distinct
backgroundColor                = "#0a0a10"
secondaryBackgroundColor       = "#13131c"
primaryColor                   = "#00e676"
textColor                      = "#c8ccd8"
borderColor                    = "#2a2a3a"
font                           = "'DM Sans':https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap"
headingFont                    = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
